<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Universal Fit icon</title>
  <desc id="desc">A high-contrast portable workout-plan mark with schema brackets, checklist rows, and a training pulse.</desc>
  <defs>
    <linearGradient id="surface" x1="186" y1="118" x2="836" y2="884" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202020"/>
      <stop offset="0.48" stop-color="#101010"/>
      <stop offset="1" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="card" x1="352" y1="254" x2="674" y2="772" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="pulse" x1="430" y1="472" x2="600" y2="552" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CCFF00"/>
      <stop offset="1" stop-color="#4D8EFF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.62 0 0 0 0 0.82 0 0 0 0 0.08 0 0 0 0.42 0" result="color"/>
      <feMerge>
        <feMergeNode in="color"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#0D0D0D"/>
  <circle cx="222" cy="170" r="270" fill="#CCFF00" opacity="0.08"/>
  <circle cx="812" cy="172" r="252" fill="#4D8EFF" opacity="0.10"/>
  <rect x="128" y="128" width="768" height="768" rx="188" fill="url(#surface)" stroke="#2A2A2A" stroke-width="8"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M382 232C300 246 286 320 336 360C370 388 370 414 336 442C286 482 300 778 382 792" stroke="#CCFF00" stroke-width="52" filter="url(#glow)"/>
    <path d="M642 232C724 246 738 320 688 360C654 388 654 414 688 442C738 482 724 778 642 792" stroke="#4D8EFF" stroke-width="52"/>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="336" y="254" width="352" height="516" rx="52" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.88" stroke-width="20"/>
    <rect x="394" y="326" width="236" height="24" rx="12" fill="#CCFF00"/>
    <rect x="394" y="380" width="144" height="18" rx="9" fill="#FFFFFF" opacity="0.92"/>
    <rect x="556" y="380" width="74" height="18" rx="9" fill="#626262"/>

    <path d="M392 510H432L462 454L506 584L546 488H602" fill="none" stroke="url(#pulse)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

    <g fill="#FFFFFF">
      <rect x="394" y="620" width="34" height="34" rx="9" opacity="0.96"/>
      <rect x="394" y="680" width="34" height="34" rx="9" opacity="0.96"/>
      <path d="M407 638L416 647L433 626" fill="none" stroke="#0D0D0D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M407 698L416 707L433 686" fill="none" stroke="#0D0D0D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="456" y="622" width="170" height="18" rx="9" fill="#FFFFFF" opacity="0.9"/>
    <rect x="456" y="680" width="132" height="18" rx="9" fill="#FFFFFF" opacity="0.68"/>
    <rect x="456" y="708" width="92" height="14" rx="7" fill="#4D8EFF" opacity="0.82"/>
  </g>
</svg>
